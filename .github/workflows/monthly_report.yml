name: Monthly Expense Report

on:
  schedule:
    # Runs at 06:00 UTC on the 1st of every month (11:30 AM IST)
    - cron: "0 6 1 * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly report
        run: |
          curl -X POST "${{ secrets.APP_URL }}/trigger/monthly-report" \
            -H "X-Scheduler-Secret: ${{ secrets.SCHEDULER_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
